version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL 16 — primary metadata store
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dvcs}
      POSTGRES_USER:     ${POSTGRES_USER:-dvcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvcs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dvcs} -d ${POSTGRES_DB:-dvcs}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Redis 7 — cache, pub/sub, and rate-limit counters
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # MinIO — S3-compatible object store for Git objects
  # ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Backend — Spring Boot 3.x modular monolith
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-dvcs}
      POSTGRES_USER:     ${POSTGRES_USER:-dvcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvcs}
      # Redis
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      # MinIO / S3
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_ENDPOINT:       http://minio:9000
      S3_BUCKET:         ${S3_BUCKET:-dvcs-objects}
      # Storage
      STORAGE_BACKEND:   ${STORAGE_BACKEND:-s3}
      STORAGE_ROOT:      ${STORAGE_ROOT:-/data/objects}
      # JWT
      JWT_SECRET:              ${JWT_SECRET:-changeme-in-production-use-a-long-random-string}
      JWT_EXPIRY_SECONDS:      ${JWT_EXPIRY_SECONDS:-900}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "8080:8080"
    volumes:
      - object_data:/data/objects
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Frontend — React SPA served by nginx
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# ─────────────────────────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  object_data:
    driver: local
