server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dvcs_notification_test
    username: dvcs
    password: dvcs
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

storage:
  backend: local
  root: ${java.io.tmpdir}/dvcs-notification-test-objects

s3:
  endpoint: http://localhost:9000
  bucket: dvcs-objects

jwt:
  secret: test-secret-key-for-integration-tests-minimum-256-bits-long
  expiry-seconds: 900
  refresh-expiry-days: 30

cors:
  allowed-origins: http://localhost:3000
