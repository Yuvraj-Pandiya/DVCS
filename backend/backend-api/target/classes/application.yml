server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dvcs}
    username: ${POSTGRES_USER:dvcs}
    password: ${POSTGRES_PASSWORD:dvcs}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

storage:
  backend: ${STORAGE_BACKEND:local}
  root: ${STORAGE_ROOT:/data/objects}

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  bucket: ${S3_BUCKET:dvcs-objects}

jwt:
  secret: ${JWT_SECRET:changeme-in-production}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:900}
  refresh-expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
